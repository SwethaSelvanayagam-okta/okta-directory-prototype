  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: #f1f5f9; }

    @keyframes spin   { to { transform: rotate(360deg); } }
    @keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:.4} }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    @keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes fadeUp  { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .animate-spin    { animation: spin 1s linear infinite; }
    .animate-pulse   { animation: pulse 2s ease-in-out infinite; }
    .animate-bounce  { animation: bounce .9s ease-in-out infinite; }
    .chat-slide-in   { animation: slideIn .28s cubic-bezier(.32,.72,0,1) forwards; }
    .fade-up         { animation: fadeUp .35s ease forwards; }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 99px; }
  </style>
</head>

const { useState, useEffect, useRef } = React;

/* ─────────────────────────────────────────────────────────────
   Inline SVG icon factory (no npm needed)
───────────────────────────────────────────────────────────── */
const Ico = ({ d, size = 16, cls = '', sw = 2 }) => (
  <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size}
    viewBox="0 0 24 24" fill="none" stroke="currentColor"
    strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" className={cls}>
    {d}
  </svg>
);

  Dashboard:  ({s=16,c=''}) => <Ico s={s} cls={c} d={<><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></>}/>,
  Users:      ({s=16,c=''}) => <Ico s={s} cls={c} d={<><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></>}/>,

  Search:     ({s=16,c=''}) => <Ico s={s} cls={c} d={<><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></>}/>,
  Bell:       ({s=16,c=''}) => <Ico s={s} cls={c} d={<><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></>}/>,
  ChevDown:   ({s=16,c=''}) => <Ico s={s} cls={c} d={<polyline points="6 9 12 15 18 9"/>}/>,
  ChevRight:  ({s=16,c=''}) => <Ico s={s} cls={c} d={<polyline points="9 18 15 12 9 6"/>}/>,
  X:          ({s=16,c=''}) => <Ico s={s} cls={c} d={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>}/>,
  Send:       ({s=16,c=''}) => <Ico s={s} cls={c} d={<><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></>}/>,
  Download:   ({s=16,c=''}) => <Ico s={s} cls={c} d={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>}/>,
  Settings:   ({s=16,c=''}) => <Ico s={s} cls={c} d={<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>}/>,
  Loader:     ({s=16,c=''}) => <Ico s={s} cls={c} d={<path d="M21 12a9 9 0 1 1-6.219-8.56"/>}/>,
  Sparkles:   ({s=16,c=''}) => <Ico s={s} cls={c} d={<><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4M19 17v4M3 5h4M17 19h4"/></>}/>,
  ExternalLink:({s=16,c=''}) => <Ico s={s} cls={c} d={<><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></>}/>,
};

/* ─────────────────────────────────────────────────────────────
   SuggestedPrompts
───────────────────────────────────────────────────────────── */
function SuggestedPrompts({ onSelect }) {
  const prompts = [
    { text: "List all inactive users",                icon: "👤" },
    { text: "Who has access to the Salesforce app?",  icon: "🔍" },
    { text: "Check brand readiness for Acme Subsidiary", icon: "🎨" },
  ];
  return (
    <div className="mt-3 space-y-2">
      <p className="text-[10px] uppercase tracking-widest text-gray-400 font-semibold mb-1">Suggested</p>
      {prompts.map((p, i) => (
        <button key={i} onClick={() => onSelect(p.text)}
          className="w-full text-left flex items-center gap-2.5 px-3 py-2.5 text-xs text-[#00297A]
            bg-gradient-to-r from-blue-50 to-indigo-50/60 border border-blue-100
            rounded-xl hover:from-blue-100 hover:to-indigo-100 hover:border-blue-200
            active:scale-[0.98] transition-all font-semibold shadow-sm fade-up"
          style={{ animationDelay: `${i * 0.07}s` }}>
          <span className="text-base leading-none">{p.icon}</span>
          {p.text}
        </button>
      ))}
    </div>
  );
}

/* ─────────────────────────────────────────────────────────────
   ChatPanel
───────────────────────────────────────────────────────────── */
function ChatPanel({ onClose }) {
  const [messages, setMessages] = useState([{ id: 1, type: 'assistant', isGreeting: true }]);
  const [chatState, setChatState] = useState('idle'); // idle | thinking
  const [input, setInput] = useState('');
  const bottomRef = useRef(null);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages, chatState]);

  const addResponse = (isStructured, fallback) => {
    setMessages(prev => [...prev, {
      id: Date.now() + 1, type: 'assistant',
      isStructured, content: fallback,
    }]);
  };

  const handlePrompt = (text) => {
    if (chatState === 'thinking') return;
    setMessages(prev => [...prev, { id: Date.now(), type: 'user', content: text }]);
    setChatState('thinking');
    setTimeout(() => {
      setChatState('idle');
      if (text === "Who has access to the Salesforce app?") {
        addResponse(true, null);
      } else if (text === "List all inactive users") {
        addResponse(false, "I found 14 inactive users in your org. 8 have been inactive for over 90 days and are candidates for deactivation. Would you like a full breakdown or to bulk-suspend them?");
      } else {
        addResponse(false, "I'm checking brand configurations for Acme Subsidiary… The subdomain and custom domain are verified ✓, but the email template still uses the parent Acme Corp logo. Would you like me to open the Brand Editor?");
      }
    }, 2200);
  };

  const handleSend = () => {
    if (!input.trim() || chatState === 'thinking') return;
    const text = input.trim();
    setInput('');
    setMessages(prev => [...prev, { id: Date.now(), type: 'user', content: text }]);
    setChatState('thinking');
    setTimeout(() => {
      setChatState('idle');
      addResponse(false, "I understand your request. This query will be fully supported in the GA release of Okta AI Admin Assistant. Try a suggested prompt above to see a live demo flow.");
    }, 1800);
  };

  return (
    <div className="fixed right-0 top-0 h-full w-[390px] bg-white shadow-2xl border-l border-gray-200 flex flex-col z-50 chat-slide-in">
      {/* Header */}
      <div className="bg-gradient-to-r from-[#001a4d] via-[#00297A] to-[#0062be] px-5 py-4 flex items-center justify-between flex-shrink-0">
        <div className="flex items-center gap-3">
          <div className="w-10 h-10 bg-white/15 border border-white/20 rounded-2xl flex items-center justify-center backdrop-blur-sm shadow-inner">
            <Icons.Sparkles s={18} c="text-white" />
          </div>
          <div>
            <p className="text-white font-bold text-sm">Okta Admin Assistant</p>
            <p className="text-blue-200 text-[11px] flex items-center gap-1.5 mt-0.5">
              <span className="w-2 h-2 bg-green-400 rounded-full shadow shadow-green-400/50"></span>
              AI-powered · Beta
            </p>
          </div>
        </div>
        <button onClick={onClose}
          className="w-8 h-8 bg-white/10 hover:bg-white/20 rounded-xl flex items-center justify-center transition-colors text-white/80 hover:text-white">
          <Icons.X s={15} />
        </button>
      </div>

      {/* Messages */}
      <div className="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50/60">
        {messages.map((msg) => (
          <div key={msg.id}>
            {msg.type === 'assistant' && (
              <div className="flex gap-2.5">
                <div className="w-8 h-8 bg-gradient-to-br from-[#00297A] to-[#0065C1] rounded-xl flex items-center justify-center flex-shrink-0 mt-0.5 shadow-md">
                  <Icons.Sparkles s={13} c="text-white" />
                </div>
                <div className="flex-1">
                  {msg.isGreeting ? (
                    <div className="bg-white border border-gray-200 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm fade-up">
                      <p className="text-sm text-gray-700 leading-relaxed">
                        Hello Admin 👋, how can I help you manage your <strong className="text-gray-900">Okta org</strong> today?
                      </p>
                      <SuggestedPrompts onSelect={handlePrompt} />
                    </div>
                  ) : msg.isStructured ? (
                    <SalesforceResponse />
                  ) : (
                    <div className="bg-white border border-gray-200 rounded-2xl rounded-tl-sm px-4 py-3 text-sm text-gray-700 shadow-sm leading-relaxed fade-up">
                      {msg.content}
                    </div>
                  )}
                </div>
              </div>
            )}
            {msg.type === 'user' && (
              <div className="flex justify-end fade-up">
                <div className="bg-gradient-to-br from-[#00297A] to-[#0065C1] text-white rounded-2xl rounded-tr-sm px-4 py-2.5 text-sm max-w-[82%] shadow-md leading-relaxed">
                  {msg.content}
                </div>
              </div>
            )}
          </div>
        ))}

        {chatState === 'thinking' && (
          <div className="flex gap-2.5 fade-up">
            <div className="w-8 h-8 bg-gradient-to-br from-[#00297A] to-[#0065C1] rounded-xl flex items-center justify-center flex-shrink-0 shadow-md">
              <Icons.Sparkles s={13} c="text-white" />
            </div>
            <div className="bg-white border border-gray-200 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm">
              <div className="flex items-center gap-2 text-xs text-gray-500 font-medium">
                <Icons.Loader s={13} c="animate-spin text-[#0065C1]" />
                <span className="animate-pulse">Okta AI is checking app assignments…</span>
              </div>
              <div className="flex gap-1.5 mt-2.5 pl-0.5">
                {[0,1,2].map(i => (
                  <span key={i}
                    className="w-2 h-2 bg-[#0065C1] rounded-full animate-bounce opacity-80"
                    style={{ animationDelay: `${i * 0.18}s` }}
                  />
                ))}
              </div>
            </div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>

      {/* Input */}
      <div className="p-4 border-t border-gray-100 bg-white flex-shrink-0">
        <div className="flex items-center gap-2 bg-gray-50 border border-gray-200 rounded-2xl px-3.5 py-2.5
          focus-within:ring-2 focus-within:ring-[#00297A]/20 focus-within:border-[#00297A]/40 transition-all">
          <input
            className="flex-1 bg-transparent text-sm text-gray-800 placeholder-gray-400 focus:outline-none"
            placeholder="Ask Okta AI anything…"
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handleSend()}
          />
          <button onClick={handleSend}
            className="w-8 h-8 bg-[#00297A] hover:bg-[#001f5c] rounded-xl flex items-center justify-center transition-all active:scale-90 shadow-sm flex-shrink-0">
            <Icons.Send s={13} c="text-white" />
          </button>
        </div>
        <p className="text-[10px] text-gray-400 text-center mt-2 leading-relaxed">
          Okta AI may make mistakes. Always verify critical changes.
        </p>
      </div>
    </div>
  );
}

        </div>

        {/* Nav */}
        <nav className="flex-1 py-3 overflow-y-auto space-y-0.5 px-2">
          {navItems.map(item => (
            <div key={item.id}>
              <button
                onClick={() => { setActiveNav(item.id); if (item.sub) setDirOpen(v => !v); }}
                className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-all
                  ${activeNav === item.id
                    ? 'bg-[#00297A] text-white shadow-md'
                    : 'text-gray-400 hover:bg-white/8 hover:text-gray-200'
                  }`}>
                <item.Icon s={15} />
                <span className="font-medium">{item.label}</span>
                {item.sub && (
                  <Icons.ChevDown s={12}
                    c={`ml-auto transition-transform duration-200 ${dirOpen && activeNav==='directory' ? '' : '-rotate-90'}`} />
                )}
              </button>
              {item.sub && activeNav === 'directory' && dirOpen && (
                <div className="ml-3 pl-3 border-l border-white/8 mt-1 mb-1 space-y-0.5">
                  {item.sub.map(s => (
                    <button key={s}
                      className={`w-full flex items-center gap-2 px-2 py-1.5 rounded-lg text-xs transition-colors
                        ${s==='People' ? 'text-sky-400 bg-sky-400/10 font-semibold' : 'text-gray-500 hover:text-gray-300 hover:bg-white/5'}`}>
                      <Icons.ChevRight s={10} />{s}
                    </button>
                  ))}
                </div>
              )}
            </div>
          ))}
        </nav>

        {/* User */}
        <div className="p-3 border-t border-white/5">
          <div className="flex items-center gap-2.5 p-2 rounded-xl hover:bg-white/5 cursor-pointer transition-colors">
            <div className="w-8 h-8 bg-[#00297A] rounded-full flex items-center justify-center text-white text-xs font-bold shadow">JA</div>
            <div className="min-w-0">
              <p className="text-xs text-gray-200 font-semibold truncate">John Admin</p>
              <p className="text-[10px] text-gray-500">Super Admin</p>
            </div>
          </div>
        </div>
      </aside>

      {/* ── MAIN ─────────────────────────────────────────── */}
      <div className="flex-1 flex flex-col overflow-hidden">

        {/* ── HEADER ── */}
        <header className="bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-4 flex-shrink-0 shadow-sm z-10">
          <div className="flex items-center gap-2">
            <span className="font-bold text-gray-900 text-sm">Acme Corp</span>
            <span className="text-gray-300">|</span>
            <span className="text-[11px] bg-blue-50 text-[#00297A] border border-blue-100 px-2.5 py-0.5 rounded-full font-semibold">
              Integrator Org
            </span>
          </div>

          <div className="flex-1 max-w-sm relative ml-1">
            <Icons.Search s={13} c="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none" />
            <input
              className="w-full pl-8 pr-3 py-1.5 text-sm bg-gray-50 border border-gray-200 rounded-lg
                focus:outline-none focus:ring-2 focus:ring-blue-400/40 focus:border-blue-300 transition-all"
              placeholder="Search Okta…"
            />
          </div>

          <div className="ml-auto flex items-center gap-3">
            {/* Okta AI CTA */}
            <button onClick={() => setChatOpen(true)}
              className="flex items-center gap-2 px-4 py-1.5 text-xs font-bold text-white rounded-xl
                bg-gradient-to-r from-[#001a4d] to-[#0062be]
                hover:from-[#00297A] hover:to-[#0078db]
                transition-all shadow-md hover:shadow-lg active:scale-95">
              <Icons.Sparkles s={13} />
              Okta AI
            </button>

            {/* Bell */}
            <div className="relative cursor-pointer group">
              <Icons.Bell s={18} c="text-gray-500 group-hover:text-gray-700 transition-colors" />
              <span className="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-[9px] text-white flex items-center justify-center font-bold border-2 border-white">2</span>
            </div>

            {/* Avatar */}
            <div className="flex items-center gap-1.5 cursor-pointer hover:bg-gray-50 rounded-xl px-2 py-1 transition-colors">
              <div className="w-8 h-8 bg-gradient-to-br from-[#00297A] to-[#0065C1] rounded-full flex items-center justify-center text-white text-xs font-bold shadow">JA</div>
              <Icons.ChevDown s={12} c="text-gray-400" />
            </div>
          </div>
        </header>

        {/* ── CONTENT ── */}
        <main className="flex-1 overflow-y-auto bg-gray-50">
          <div className="p-6 max-w-7xl">

            {/* Page title */}
            <div className="flex items-start justify-between mb-6">
              <div>
                <nav className="flex items-center gap-1.5 text-xs text-gray-400 mb-1.5">
                  <span>Directory</span>
                  <Icons.ChevRight s={10} />
                  <span className="text-gray-600 font-semibold">People</span>
                </nav>
                <h1 className="text-xl font-bold text-gray-900">People</h1>
                <p className="text-xs text-gray-400 mt-0.5">Manage all users in your Okta organization</p>
              </div>
              <div className="flex items-center gap-2">
                <button className="px-3.5 py-2 text-xs border border-gray-200 rounded-xl bg-white hover:bg-gray-50 text-gray-600 font-semibold transition-colors shadow-sm">
                  Import Users
                </button>
                <button className="px-3.5 py-2 text-xs bg-[#00297A] hover:bg-[#001f5c] text-white rounded-xl font-bold transition-colors shadow-md">
                  + Add Person
                </button>
              </div>
            </div>

            {/* Stats */}
            <div className="grid grid-cols-4 gap-4 mb-6">
              {stats.map((s, i) => (
                <div key={i} className="bg-white rounded-2xl border border-gray-200 p-4 shadow-sm hover:shadow-md transition-shadow">
                  <p className="text-2xl font-extrabold text-gray-900">{s.val}</p>
                  <p className="text-xs text-gray-500 mt-0.5 font-medium">{s.label}</p>
                  <div className="w-full bg-gray-100 rounded-full h-1 mt-2.5">
                    <div className={`h-1 rounded-full ${s.bar} ${s.w}`}></div>
                  </div>
                  <p className={`text-[11px] mt-1.5 font-semibold ${s.cls}`}>{s.note}</p>
                </div>
              ))}
            </div>

            {/* Filter bar */}
            <div className="flex items-center gap-2.5 mb-4 flex-wrap">
              <div className="relative">
                <Icons.Search s={13} c="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none" />
                <input
                  className="pl-8 pr-4 py-2 text-xs bg-white border border-gray-200 rounded-xl w-64
                    focus:outline-none focus:ring-2 focus:ring-blue-400/30 shadow-sm transition-all"
                  placeholder="Search people…"
                />
              </div>
              {['Status: All','Type: All','Filter'].map(f => (
                <button key={f} className="flex items-center gap-1.5 px-3 py-2 text-xs border border-gray-200 rounded-xl bg-white hover:bg-gray-50 text-gray-600 font-medium shadow-sm transition-colors">
                  {f} <Icons.ChevDown s={11} />
                </button>
              ))}
              <button className="ml-auto px-3 py-2 text-xs text-gray-400 hover:text-gray-600 font-medium transition-colors flex items-center gap-1">
                <Icons.Download s={12} /> Export
              </button>
            </div>

            {/* Table */}
            <div className="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm">
              <table className="w-full text-sm">
                <thead>
                  <tr className="bg-gray-50/80 border-b border-gray-200">
                    <th className="px-4 py-3 w-10">
                      <input type="checkbox" className="rounded border-gray-300 cursor-pointer" />
                    </th>
                    {['Name','Username / Email','Status','Apps','Last Login',''].map(h => (
                      <th key={h} className="text-left px-4 py-3 text-[10px] font-bold text-gray-400 uppercase tracking-wider">{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {users.map((u, i) => (
                    <tr key={i}
                      className="border-b border-gray-100 hover:bg-blue-50/30 cursor-pointer transition-colors group">
                      <td className="px-4 py-3">
                        <input type="checkbox" className="rounded border-gray-300 cursor-pointer" />
                      </td>
                      <td className="px-4 py-3">
                        <div className="flex items-center gap-3">
                          <div className="w-9 h-9 rounded-full bg-gradient-to-br from-[#0065C1] to-[#00297A]
                            flex items-center justify-center text-white text-[11px] font-bold flex-shrink-0 shadow-sm">
                            {initials(u.name)}
                          </div>
                          <span className="font-semibold text-gray-900 group-hover:text-[#00297A] transition-colors text-sm">{u.name}</span>
                        </div>
                      </td>
                      <td className="px-4 py-3 text-xs text-gray-500">{u.email}</td>
                      <td className="px-4 py-3">
                        <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11px] font-bold ${statusBadge(u.status)}`}>
                          <span className={`w-1.5 h-1.5 rounded-full ${statusDot(u.status)}`}></span>
                          {u.status}
                        </span>
                      </td>
                      <td className="px-4 py-3">
                        <span className="text-sm font-semibold text-gray-700">{u.apps}</span>
                        <span className="text-xs text-gray-400 ml-1">apps</span>
                      </td>
                      <td className="px-4 py-3 text-xs text-gray-400">{u.login}</td>
                      <td className="px-4 py-3">
                        <button className="opacity-0 group-hover:opacity-100 transition-opacity text-xs text-[#00297A] font-semibold hover:underline flex items-center gap-1">
                          View <Icons.ExternalLink s={11} />
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>

              {/* Pagination */}
              <div className="px-4 py-3 bg-gray-50/70 border-t border-gray-200 flex items-center justify-between">
                <span className="text-xs text-gray-400">
                  Showing <strong className="text-gray-600">1–6</strong> of <strong className="text-gray-600">2,847</strong> people
                </span>
                <div className="flex gap-1">
                  {['← Prev','1','2','3','…','Next →'].map((p,i) => (
                    <button key={i}
                      className={`px-2.5 py-1.5 text-[11px] rounded-lg border font-semibold transition-colors
                        ${p==='1'
                          ? 'bg-[#00297A] text-white border-[#00297A] shadow-sm'
                          : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'
                        }`}>
                      {p}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>

      {/* ── CHAT PANEL ── */}
      {chatOpen && <ChatPanel onClose={() => setChatOpen(false)} />}

      {/* ── FAB ── */}
      {!chatOpen && (
        <button onClick={() => setChatOpen(true)}
          title="Open Okta AI"
          className="fixed bottom-6 right-6 w-14 h-14 z-40
            bg-gradient-to-br from-[#001a4d] to-[#0062be]
            rounded-2xl shadow-xl hover:shadow-2xl
            hover:scale-105 active:scale-95 transition-all
            flex items-center justify-center">
          <Icons.Sparkles s={22} c="text-white" />
          <span className="absolute -top-1 -right-1 w-4 h-4 bg-green-400 rounded-full border-2 border-white shadow-sm"></span>
        </button>
      )}
    </div>
  );
}

/* ── Mount ── */
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
